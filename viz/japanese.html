const MAXZ=Math.max(1,...DATA.map(d=>d.z||0));

const order={};{let c={};DATA.forEach(d=>c[d.c]=(c[d.c]||0)+1);

const CATS=Object.keys(order).sort((a,b)=>order[a]-order[b]);

 });
}
